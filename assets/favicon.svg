<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Belluga Vogue — Luxury fashion crown, professional mark -->
  <rect width="32" height="32" rx="8" fill="#2D1B2E"/>
  <!-- Crown silhouette: tall elegant 3-peak arch -->
  <path d="M4 26 L4 15 L10.5 20.5 L16 7 L21.5 20.5 L28 15 L28 26 Z" fill="#C4847A"/>
  <!-- Crown base band -->
  <rect x="4" y="24" width="24" height="2.5" rx="0.5" fill="#C4847A"/>
  <!-- Base band highlight — thin bright edge for depth -->
  <rect x="4" y="24" width="24" height="0.75" rx="0.5" fill="#F2D5C8" opacity="0.55"/>
  <!-- Center peak gem — bright pearl -->
  <circle cx="16" cy="7" r="2.8" fill="#F2D5C8"/>
  <!-- Gem inner facet -->
  <circle cx="16" cy="7" r="1.4" fill="#C4847A" opacity="0.7"/>
</svg>
